<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Quantum Ventures">
  <defs>
    <linearGradient id="ring" x1="40" y1="22" x2="206" y2="216" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d6fbff"/>
      <stop offset="0.26" stop-color="#5cc8f5"/>
      <stop offset="0.58" stop-color="#2293e6"/>
      <stop offset="0.84" stop-color="#3a57d6"/>
      <stop offset="1" stop-color="#312a9c"/>
    </linearGradient>
    <linearGradient id="ringHi" x1="64" y1="38" x2="176" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="nucleus" cx="0.36" cy="0.29" r="0.85">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.17" stop-color="#d4f3ff"/>
      <stop offset="0.45" stop-color="#33c6f0"/>
      <stop offset="0.78" stop-color="#1f7fd6"/>
      <stop offset="1" stop-color="#15246f"/>
    </radialGradient>
    <radialGradient id="electron" cx="0.34" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.4" stop-color="#7fd9fb"/>
      <stop offset="0.8" stop-color="#1a7ec4"/>
      <stop offset="1" stop-color="#0a386f"/>
    </radialGradient>
    <radialGradient id="ground" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3ba9e6" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#3ba9e6" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <ellipse cx="120" cy="198" rx="60" ry="6.5" fill="url(#ground)" filter="url(#soft)"/>

  <!-- glossy orbital ribbons: more elongated + thicker to match the approved render's shield silhouette -->
  <g filter="url(#glow)">
    <ellipse cx="120" cy="120" rx="34" ry="98" transform="rotate(45 120 120)" fill="none" stroke="url(#ring)" stroke-width="13"/>
    <ellipse cx="120" cy="120" rx="34" ry="98" transform="rotate(-45 120 120)" fill="none" stroke="url(#ring)" stroke-width="13"/>
    <ellipse cx="120" cy="120" rx="34" ry="98" transform="rotate(45 120 120)" fill="none" stroke="#0a1f63" stroke-width="2.6" opacity="0.32"/>
    <ellipse cx="120" cy="120" rx="34" ry="98" transform="rotate(-45 120 120)" fill="none" stroke="#0a1f63" stroke-width="2.6" opacity="0.32"/>
    <ellipse cx="120" cy="118.2" rx="34" ry="98" transform="rotate(45 120 120)" fill="none" stroke="url(#ringHi)" stroke-width="2.8"/>
    <ellipse cx="120" cy="118.2" rx="34" ry="98" transform="rotate(-45 120 120)" fill="none" stroke="url(#ringHi)" stroke-width="2.8"/>
  </g>

  <!-- electron (lower-left glossy sphere) -->
  <g filter="url(#glow)">
    <circle cx="88" cy="156" r="12" fill="url(#electron)"/>
    <ellipse cx="83.6" cy="151.6" rx="3.8" ry="2.6" fill="#ffffff" opacity="0.85"/>
  </g>

  <!-- nucleus -->
  <g filter="url(#glow)">
    <circle cx="120" cy="120" r="19.5" fill="url(#nucleus)"/>
    <ellipse cx="113.2" cy="113.4" rx="6.2" ry="4.2" fill="#ffffff" opacity="0.8"/>
  </g>

  <!-- specular sparkles -->
  <g fill="#ffffff">
    <path d="M170 58 l2.3 6.4 6.4 2.3 -6.4 2.3 -2.3 6.4 -2.3 -6.4 -6.4 -2.3 6.4 -2.3 z" opacity="0.95" filter="url(#glow)"/>
    <path d="M80 92 l1.6 4.5 4.5 1.6 -4.5 1.6 -1.6 4.5 -1.6 -4.5 -4.5 -1.6 4.5 -1.6 z" opacity="0.82" filter="url(#glow)"/>
  </g>
</svg>
